name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          set -eux
          ls -la
          unzip -o FrostGlassSample.zip
          echo "== find settings.gradle.kts =="
          find . -maxdepth 10 -type f -name "settings.gradle.kts" -print || true
          echo "== find app/build.gradle.kts =="
          find . -maxdepth 10 -type f -path "*/app/build.gradle.kts" -print || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Gradle 8.7
        run: |
          set -eux
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH
          gradle -v

      - name: Detect project root (robust)
        id: detect
        run: |
          set -eux
          # settings.gradle.kts があるディレクトリ = Gradleプロジェクトルート
          PROJECT_DIR="$(find . -maxdepth 10 -type f -name settings.gradle.kts -print -quit | xargs -I{} dirname "{}")"
          if [ -z "${PROJECT_DIR}" ]; then
            echo "ERROR: settings.gradle.kts not found"
            exit 1
          fi
          echo "Detected PROJECT_DIR=${PROJECT_DIR}"
          echo "project_dir=${PROJECT_DIR}" >> $GITHUB_OUTPUT
          ls -la "${PROJECT_DIR}"

      # Kotlin 2.0 だと Compose Compiler plugin 必須で落ちるため、ビルド時だけ Kotlin 1.9.24 に寄せる
      - name: Patch Kotlin (avoid compose plugin requirement)
        run: |
          set -eux
          cd "${{ steps.detect.outputs.project_dir }}"

          echo "== BEFORE root build.gradle.kts =="
          sed -n '1,120p' build.gradle.kts || true

          # Kotlin plugin version を 1.9.24 に（2.0.x / 2.1.x をまとめて落とす）
          sed -i 's/id("org.jetbrains.kotlin.android") version "2\.[0-9]\+\.[0-9]\+"/id("org.jetbrains.kotlin.android") version "1.9.24"/' build.gradle.kts || true

          # Compose compiler extension も 1.9系に合わせる（書いてあれば置換）
          sed -i 's/kotlinCompilerExtensionVersion = "1\.5\.[0-9]\+"/kotlinCompilerExtensionVersion = "1.5.14"/' app/build.gradle.kts || true

          echo "== AFTER root build.gradle.kts =="
          sed -n '1,120p' build.gradle.kts || true

      - name: Build Debug APK
        run: |
          set -eux
          cd "${{ steps.detect.outputs.project_dir }}"
          gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
