name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o FrostGlassSample.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ★ wrapper jar が無いので Actions 側で生成する
      - name: Generate Gradle Wrapper
        run: |
          cd FrostGlassSample
          gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        run: |
          cd FrostGlassSample
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: FrostGlassSample/app/build/outputs/apk/debug/app-debug.apk        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: FrostGlassSample/app/build/outputs/apk/debug/app-debug.apk
