name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          ls -la
          unzip -o FrostGlassSample.zip
          echo "== after unzip =="
          find . -maxdepth 4 -type f -name "settings.gradle.kts" -print || true
          find . -maxdepth 4 -type f -name "build.gradle.kts" -print || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect project root
        id: detect
        run: |
          set -e
          PROJECT_DIR="$(find . -maxdepth 5 -name settings.gradle.kts -print -quit | xargs -I{} dirname "{}")"
          echo "PROJECT_DIR=$PROJECT_DIR"
          test -n "$PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "== project dir listing =="
          ls -la "$PROJECT_DIR"

      # wrapper jar が無い前提なので Actions 側で生成する
      - name: Generate Gradle Wrapper
        run: |
          set -e
          cd "${{ steps.detect.outputs.project_dir }}"
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      # Kotlin 2.0 だと Compose Compiler plugin 必須で落ちるので、ビルド時だけ Kotlin 1.9 に上書き
      - name: Force Kotlin 1.9.x (avoid compose plugin requirement)
        run: |
          set -e
          cd "${{ steps.detect.outputs.project_dir }}"

          echo "== BEFORE root build.gradle.kts =="
          sed -n '1,120p' build.gradle.kts || true

          # Kotlin plugin version を 1.9.24 に
          sed -i 's/id("org.jetbrains.kotlin.android") version "2.0.20"/id("org.jetbrains.kotlin.android") version "1.9.24"/' build.gradle.kts || true
          sed -i 's/id("org.jetbrains.kotlin.android") version "2.0.21"/id("org.jetbrains.kotlin.android") version "1.9.24"/' build.gradle.kts || true
          sed -i 's/id("org.jetbrains.kotlin.android") version "2.1.0"/id("org.jetbrains.kotlin.android") version "1.9.24"/' build.gradle.kts || true

          # compose compiler extension (Kotlin 1.9系に合わせる)
          sed -i 's/kotlinCompiler
