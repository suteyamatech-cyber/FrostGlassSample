name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o FrostGlassSample.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Detect project root
        id: detect
        run: |
          PROJECT_DIR=$(find . -maxdepth 5 -name settings.gradle.kts -print -quit | xargs dirname)
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Detected: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      # ★これを追加：Kotlin 2.0 を 1.9.24 に落として Compose plugin 必須問題を回避
      - name: Force Kotlin 1.9.24 for build
        run: |
          cd "${{ steps.detect.outputs.project_dir }}"
          echo "== BEFORE root build.gradle.kts =="
