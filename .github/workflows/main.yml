name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip FrostGlassSample.zip
          cd FrostGlassSample
          ls

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: |
          cd FrostGlassSample
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd FrostGlassSample
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: FrostGlassSample/app/build/outputs/apk/debug/app-debug.apk
